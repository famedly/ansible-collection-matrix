---
- name: Check if element is already deployed
  stat:
    path: "{{ element_webapp_dir }}/element-v{{ element_version }}"
  register: element_app_directory

- name: Deploy element
  when: not element_app_directory.stat.exists
  block:
    - name: Create gpg temporary home directory
      file:
        dest: /tmp/gpg-tmp
        state: directory
        mode: "0700"

    - name: Download element v{{ element_version }}
      get_url:
        url: "https://github.com/element-hq/element-web/releases/download/v{{ element_version }}/element-v{{ element_version }}.tar.gz"
        dest: "/tmp/element-v{{ element_version }}.tar.gz"
        mode: "0600"
      register: element_source
      until: element_source is success
      retries: 10
      delay: 5

    - name: Download element v{{ element_version }} signature
      get_url:
        url: "https://github.com/element-hq/element-web/releases/download/v{{ element_version }}/element-v{{ element_version }}.tar.gz.asc"
        dest: "/tmp/element-v{{ element_version }}.tar.gz.asc"
        mode: "0600"
      register: element_source_sig
      until: element_source_sig is success
      retries: 10
      delay: 5

    - name: Retrieve the Element release key  # noqa no-changed-when
      command: >-
        gpg --no-default-keyring
        --homedir /tmp/gpg-tmp
        --keyring /tmp/gpg-tmp/element-key
        --keyserver hkps://keyserver.ubuntu.com
        --recv-keys 2BAA9B8552BD9047
      register: get_element_gpg_key
      until: get_element_gpg_key.rc == 0
      retries: 10
      delay: 2

    - name: "Verify element v{{ element_version }}'s signature"  # noqa no-changed-when
      command: >-
        gpg --no-default-keyring
        --homedir /tmp/gpg-tmp
        --keyring /tmp/gpg-tmp/element-key
        --verify /tmp/element-v{{ element_version }}.tar.gz.asc
        /tmp/element-v{{ element_version }}.tar.gz
      register: element_tarball_verification

    - name: Unpack element to temp dir
      unarchive:
        src: "/tmp/element-v{{ element_version }}.tar.gz"
        dest: "/tmp/element-web"
        remote_src: true
      when: element_tarball_verification.rc == 0

    - name: Copy element-web from temp dir to {{ element_webapp_dir }}
      copy:
        src: "/tmp/element-web/element-{{ element_version }}"
        dest: "{{ element_webapp_dir }}"
        remote_src: true

    - name: Clean temporary directories
      file:
        dest: "{{ item }}"
        state: absent
      loop:
        - "/tmp/gpg-tmp"
        - "/tmp/element-web"
